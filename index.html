<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TimeFlow App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<meta name="theme-color" content="#6366f1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
font-family:'Sora',sans-serif;
background:#0f172a;
color:white;
overflow-x:hidden;
}

:root{
--primary:#6366f1;
--secondary:#ec4899;
}

.light-mode{
background:#f8fafc;
color:#0f172a;
}

.hidden{
display:none !important;
}

/* WELCOME */

.welcome-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#6366f1,#ec4899);
z-index:1000;
}

.welcome-box{
width:100%;
max-width:400px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
text-align:center;
}

.welcome-box h1{
font-size:40px;
margin-bottom:10px;
font-family:'Poppins';
}

.welcome-box p{
opacity:.8;
margin-bottom:30px;
}

.input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.2);
color:white;
font-size:16px;
margin-bottom:20px;
}

.input::placeholder{
color:rgba(255,255,255,.7);
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#6366f1,#ec4899);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
}

/* APP */

.app{
min-height:100vh;
padding-bottom:90px;
}

.header{
position:sticky;
top:0;
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
background:rgba(15,23,42,.9);
backdrop-filter:blur(10px);
}

.light-mode .header{
background:rgba(255,255,255,.9);
}

.header h2{
font-family:'Poppins';
font-size:22px;
}

.icon-btn{
width:42px;
height:42px;
border:none;
border-radius:12px;
background:rgba(99,102,241,.15);
color:var(--primary);
font-size:18px;
cursor:pointer;
}

.container{
padding:18px;
}

.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
margin-bottom:18px;
}

.light-mode .card{
background:white;
}

.greeting{
background:linear-gradient(135deg,#6366f1,#ec4899);
}

.greeting h1{
font-size:28px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
margin-top:15px;
}

.small-card{
background:rgba(255,255,255,.05);
padding:18px;
border-radius:15px;
text-align:center;
}

.small-card h3{
font-size:13px;
opacity:.7;
margin-bottom:8px;
}

.small-card p{
font-size:24px;
font-weight:700;
color:var(--primary);
}

.task{
display:flex;
align-items:center;
gap:12px;
padding:15px;
border-radius:15px;
background:rgba(255,255,255,.05);
margin-bottom:12px;
}

.checkbox{
width:24px;
height:24px;
border:2px solid var(--primary);
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
flex-shrink:0;
}

.checked{
background:var(--primary);
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:75px;
background:rgba(15,23,42,.95);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
align-items:center;
z-index:100;
}

.light-mode .bottom-nav{
background:white;
}

.nav-btn{
border:none;
background:none;
color:#94a3b8;
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
font-size:18px;
cursor:pointer;
}

.nav-btn.active{
color:var(--primary);
}

.fab{
position:fixed;
right:20px;
bottom:90px;
width:60px;
height:60px;
border:none;
border-radius:50%;
background:linear-gradient(135deg,#6366f1,#ec4899);
color:white;
font-size:24px;
cursor:pointer;
box-shadow:0 5px 20px rgba(99,102,241,.4);
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:1000;
}

.modal.active{
display:flex;
}

.modal-content{
width:100%;
max-width:450px;
background:#1e293b;
padding:25px;
border-radius:20px;
}

.light-mode .modal-content{
background:white;
}

.modal-content h2{
margin-bottom:20px;
}

.modal-content input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:12px;
background:rgba(255,255,255,.08);
color:white;
}

.light-mode .modal-content input{
background:#f1f5f9;
color:black;
}

.close{
float:right;
cursor:pointer;
font-size:24px;
}

.empty{
text-align:center;
opacity:.7;
padding:20px;
}

@media(max-width:500px){

.greeting h1{
font-size:22px;
}

}

</style>
</head>

<body>

<!-- WELCOME -->

<div class="welcome-screen" id="welcomeScreen">

<div class="welcome-box">

<h1>⏱️ TimeFlow</h1>

<p>Master your studies</p>

<form id="welcomeForm">

<input type="text" class="input" id="nameInput" placeholder="Enter your name" required>

<button class="btn" type="submit">
Get Started
</button>

</form>

</div>

</div>

<!-- APP -->

<div class="app hidden" id="app">

<div class="header">

<h2 id="headerTitle">Home</h2>

<button class="icon-btn" id="themeBtn">
<i class="fas fa-moon"></i>
</button>

</div>

<div class="container">

<div class="card greeting">

<h1>Welcome, <span id="username">Student</span> 👋</h1>

<p id="greetText">Good Morning</p>

</div>

<div class="grid">

<div class="small-card">
<h3>TIME</h3>
<p id="time">00:00</p>
</div>

<div class="small-card">
<h3>DATE</h3>
<p id="date">Mon</p>
</div>

<div class="small-card">
<h3>TASKS</h3>
<p id="taskCount">0</p>
</div>

</div>

<h3 style="margin:20px 0">Today's Tasks</h3>

<div id="taskList">

<div class="empty">No Tasks Yet</div>

</div>

</div>

<button class="fab" id="addTaskBtn">
+
</button>

<div class="bottom-nav">

<button class="nav-btn active">
<i class="fas fa-home"></i>
<small>Home</small>
</button>

<button class="nav-btn">
<i class="fas fa-book"></i>
<small>Subjects</small>
</button>

<button class="nav-btn">
<i class="fas fa-tasks"></i>
<small>Tasks</small>
</button>

<button class="nav-btn">
<i class="fas fa-cog"></i>
<small>Settings</small>
</button>

</div>

</div>

<!-- MODAL -->

<div class="modal" id="taskModal">

<div class="modal-content">

<span class="close" id="closeModal">&times;</span>

<h2>Add Task</h2>

<form id="taskForm">

<input type="text" id="taskTitle" placeholder="Task title" required>

<input type="time" id="taskTime">

<button class="btn" type="submit">
Save Task
</button>

</form>

</div>

</div>

<script>

const state={
user:{
name:"",
dark:true
},
tasks:[]
};

function saveData(){
localStorage.setItem("timeflow-app",JSON.stringify(state));
}

function loadData(){

const data=localStorage.getItem("timeflow-app");

if(data){

const parsed=JSON.parse(data);

state.user=parsed.user || state.user;
state.tasks=parsed.tasks || [];

}

}

const welcomeScreen=document.getElementById("welcomeScreen");
const app=document.getElementById("app");

function init(){

loadData();

if(state.user.name){

showApp();

}else{

welcomeScreen.classList.remove("hidden");
app.classList.add("hidden");

}

applyTheme();

updateClock();

setInterval(updateClock,1000);

renderTasks();

}

function showApp(){

welcomeScreen.classList.add("hidden");
app.classList.remove("hidden");

document.getElementById("username").textContent=state.user.name;

}

document.getElementById("welcomeForm").addEventListener("submit",function(e){

e.preventDefault();

const name=document.getElementById("nameInput").value.trim();

if(!name) return;

state.user.name=name;

saveData();

showApp();

});

function updateClock(){

const now=new Date();

const h=String(now.getHours()).padStart(2,"0");
const m=String(now.getMinutes()).padStart(2,"0");

document.getElementById("time").textContent=`${h}:${m}`;

document.getElementById("date").textContent=now.toDateString().slice(0,10);

}

document.getElementById("addTaskBtn").addEventListener("click",()=>{

document.getElementById("taskModal").classList.add("active");

});

document.getElementById("closeModal").addEventListener("click",()=>{

document.getElementById("taskModal").classList.remove("active");

});

document.getElementById("taskForm").addEventListener("submit",function(e){

e.preventDefault();

const title=document.getElementById("taskTitle").value;
const time=document.getElementById("taskTime").value;

state.tasks.push({
id:Date.now(),
title,
time,
done:false
});

saveData();

renderTasks();

document.getElementById("taskForm").reset();

document.getElementById("taskModal").classList.remove("active");

});

function renderTasks(){

const taskList=document.getElementById("taskList");

document.getElementById("taskCount").textContent=state.tasks.length;

if(state.tasks.length===0){

taskList.innerHTML='<div class="empty">No Tasks Yet</div>';
return;

}

taskList.innerHTML=state.tasks.map(task=>`

<div class="task">

<div class="checkbox ${task.done ? 'checked':''}" onclick="toggleTask(${task.id})">
${task.done ? '✓':''}
</div>

<div>
<div style="font-weight:700">${task.title}</div>
<div style="font-size:12px;opacity:.7">${task.time}</div>
</div>

</div>

`).join("");

}

function toggleTask(id){

const task=state.tasks.find(t=>t.id===id);

if(task){

task.done=!task.done;

saveData();

renderTasks();

}

}

document.getElementById("themeBtn").addEventListener("click",()=>{

state.user.dark=!state.user.dark;

applyTheme();

saveData();

});

function applyTheme(){

if(state.user.dark){

document.body.classList.remove("light-mode");

}else{

document.body.classList.add("light-mode");

}

}

window.addEventListener("load",init);

</script>

</body>
</html>
