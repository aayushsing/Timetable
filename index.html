<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>TimeFlow - Smart Study Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<meta name="theme-color" content="#6366f1">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{
--primary:#6366f1;
--secondary:#ec4899;
--bg:#0f172a;
--card:#1e293b;
--text:#ffffff;
--muted:#94a3b8;
}

body{
font-family:'Sora',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
transition:.3s;
}

body.light{
--bg:#f8fafc;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
}

.hidden{
display:none !important;
}

/* WELCOME */

.welcome{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#6366f1,#ec4899);
z-index:999;
}

.welcome-box{
width:100%;
max-width:400px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(12px);
padding:35px;
border-radius:25px;
text-align:center;
}

.logo{
font-size:70px;
margin-bottom:20px;
}

.welcome h1{
font-size:40px;
font-family:'Poppins';
margin-bottom:10px;
}

.welcome p{
opacity:.8;
margin-bottom:25px;
}

.input{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.18);
color:white;
font-size:16px;
margin-bottom:20px;
outline:none;
}

.input::placeholder{
color:rgba(255,255,255,.7);
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#6366f1,#ec4899);
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

.btn:active{
transform:scale(.97);
}

/* APP */

.app{
min-height:100vh;
padding-bottom:100px;
}

.header{
position:sticky;
top:0;
z-index:100;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(15,23,42,.9);
backdrop-filter:blur(10px);
}

.light .header{
background:rgba(255,255,255,.9);
}

.header-title{
font-size:24px;
font-weight:700;
font-family:'Poppins';
}

.icon-btn{
width:45px;
height:45px;
border:none;
border-radius:14px;
background:rgba(99,102,241,.15);
color:var(--primary);
font-size:18px;
cursor:pointer;
transition:.2s;
}

.icon-btn:active{
transform:scale(.95);
}

.container{
padding:18px;
animation:fade .25s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card{
background:var(--card);
border-radius:22px;
padding:20px;
margin-bottom:18px;
}

.greeting{
background:linear-gradient(135deg,#6366f1,#ec4899);
}

.greeting h1{
font-size:28px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
margin-top:18px;
}

.small-card{
background:var(--card);
padding:18px;
border-radius:18px;
text-align:center;
}

.small-card h3{
font-size:13px;
color:var(--muted);
margin-bottom:8px;
}

.small-card p{
font-size:24px;
font-weight:700;
color:var(--primary);
}

/* TASK */

.task{
display:flex;
align-items:center;
gap:14px;
background:var(--card);
padding:16px;
border-radius:18px;
margin-bottom:12px;
}

.checkbox{
width:24px;
height:24px;
border:2px solid var(--primary);
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
flex-shrink:0;
}

.checked{
background:var(--primary);
color:white;
}

.task-title{
font-weight:700;
font-size:15px;
}

.task-time{
font-size:12px;
color:var(--muted);
margin-top:4px;
}

.empty{
text-align:center;
padding:30px;
color:var(--muted);
}

/* NAVBAR */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:80px;
background:rgba(15,23,42,.96);
backdrop-filter:blur(12px);
display:flex;
justify-content:space-around;
align-items:center;
z-index:100;
}

.light .bottom-nav{
background:rgba(255,255,255,.95);
}

.nav-btn{
border:none;
background:none;
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
color:#94a3b8;
cursor:pointer;
font-size:18px;
transition:.2s;
flex:1;
height:100%;
justify-content:center;
}

.nav-btn.active{
color:var(--primary);
border-top:3px solid var(--primary);
}

.nav-btn small{
font-size:11px;
}

/* FAB */

.fab{
position:fixed;
right:20px;
bottom:95px;
width:62px;
height:62px;
border:none;
border-radius:50%;
background:linear-gradient(135deg,#6366f1,#ec4899);
color:white;
font-size:24px;
cursor:pointer;
box-shadow:0 10px 25px rgba(99,102,241,.35);
z-index:99;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal.active{
display:flex;
}

.modal-content{
width:100%;
max-width:450px;
background:var(--card);
padding:25px;
border-radius:25px;
animation:fade .25s ease;
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.close{
font-size:24px;
cursor:pointer;
}

.modal-content input{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:rgba(99,102,241,.08);
color:var(--text);
margin-bottom:15px;
font-size:15px;
outline:none;
}

/* SUBJECT */

.subject{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px;
border-radius:18px;
background:var(--card);
margin-bottom:12px;
}

.subject-left{
display:flex;
align-items:center;
gap:15px;
}

.subject-icon{
font-size:28px;
}

.subject-name{
font-weight:700;
}

/* SETTINGS */

.setting-btn{
margin-bottom:15px;
}

/* MOBILE */

@media(max-width:500px){

.greeting h1{
font-size:22px;
}

.header-title{
font-size:20px;
}

}

</style>
</head>

<body>

<!-- WELCOME -->

<div class="welcome" id="welcomeScreen">

<div class="welcome-box">

<div class="logo">⏱️</div>

<h1>TimeFlow</h1>

<p>Master your studies with smart planning</p>

<form id="welcomeForm">

<input type="text"
class="input"
id="nameInput"
placeholder="Enter your name"
required>

<button class="btn">
Get Started
</button>

</form>

</div>

</div>

<!-- APP -->

<div class="app hidden" id="app">

<div class="header">

<div class="header-title" id="headerTitle">
Home
</div>

<button class="icon-btn" id="themeBtn">
<i class="fas fa-moon"></i>
</button>

</div>

<div class="container" id="mainContainer">

</div>

<button class="fab" id="addTaskBtn">
+
</button>

<div class="bottom-nav">

<button class="nav-btn active" data-view="home">
<i class="fas fa-home"></i>
<small>Home</small>
</button>

<button class="nav-btn" data-view="subjects">
<i class="fas fa-book"></i>
<small>Subjects</small>
</button>

<button class="nav-btn" data-view="tasks">
<i class="fas fa-tasks"></i>
<small>Tasks</small>
</button>

<button class="nav-btn" data-view="settings">
<i class="fas fa-cog"></i>
<small>Settings</small>
</button>

</div>

</div>

<!-- TASK MODAL -->

<div class="modal" id="taskModal">

<div class="modal-content">

<div class="modal-header">

<h2>Add Task</h2>

<div class="close" id="closeTaskModal">
×
</div>

</div>

<form id="taskForm">

<input type="text"
id="taskTitle"
placeholder="Task title"
required>

<input type="time"
id="taskTime"
required>

<button class="btn">
Save Task
</button>

</form>

</div>

</div>

<script>

/* =========================
STATE
========================= */

const state = {
user:{
name:"",
dark:true
},
tasks:[],
subjects:["Mathematics","Physics"],
currentView:"home"
};

/* =========================
STORAGE
========================= */

function saveData(){
localStorage.setItem(
"timeflow-data",
JSON.stringify(state)
);
}

function loadData(){

const data =
localStorage.getItem("timeflow-data");

if(data){

const parsed = JSON.parse(data);

state.user = parsed.user || state.user;
state.tasks = parsed.tasks || [];
state.subjects = parsed.subjects || [];
state.currentView = parsed.currentView || "home";

}

}

/* =========================
ELEMENTS
========================= */

const app = document.getElementById("app");
const welcome = document.getElementById("welcomeScreen");
const container = document.getElementById("mainContainer");

/* =========================
INIT
========================= */

window.addEventListener("load",()=>{

loadData();

applyTheme();

setupNavbar();

setupEvents();

if(state.user.name){
showApp();
}else{
showWelcome();
}

updateClock();

setInterval(updateClock,1000);

});

/* =========================
SHOW APP
========================= */

function showWelcome(){

welcome.classList.remove("hidden");
app.classList.add("hidden");

}

function showApp(){

welcome.classList.add("hidden");
app.classList.remove("hidden");

switchView(state.currentView);

}

/* =========================
LOGIN
========================= */

document.getElementById("welcomeForm")
.addEventListener("submit",(e)=>{

e.preventDefault();

const name =
document.getElementById("nameInput")
.value.trim();

if(!name) return;

state.user.name = name;

saveData();

showApp();

});

/* =========================
NAVBAR FIX
========================= */

function setupNavbar(){

document.querySelectorAll(".nav-btn")
.forEach(btn=>{

btn.addEventListener("click",()=>{

const view = btn.dataset.view;

switchView(view);

});

});

}

function switchView(view){

state.currentView = view;

saveData();

document.querySelectorAll(".nav-btn")
.forEach(btn=>{

btn.classList.remove("active");

if(btn.dataset.view === view){
btn.classList.add("active");
}

});

document.getElementById("headerTitle")
.innerText =
view.charAt(0).toUpperCase() +
view.slice(1);

renderView(view);

}

/* =========================
RENDER VIEW
========================= */

function renderView(view){

if(view === "home"){
renderHome();
}

if(view === "subjects"){
renderSubjects();
}

if(view === "tasks"){
renderTasksView();
}

if(view === "settings"){
renderSettings();
}

}

/* =========================
HOME
========================= */

function renderHome(){

container.innerHTML = `

<div class="card greeting">

<h1>
Welcome, ${state.user.name} 👋
</h1>

<p>
${getGreeting()}
</p>

</div>

<div class="grid">

<div class="small-card">
<h3>TIME</h3>
<p id="timeBox">
${getTime()}
</p>
</div>

<div class="small-card">
<h3>DATE</h3>
<p>
${new Date().toDateString().slice(0,10)}
</p>
</div>

<div class="small-card">
<h3>TASKS</h3>
<p>
${state.tasks.length}
</p>
</div>

</div>

<h3 style="margin:25px 0 15px">
Today's Tasks
</h3>

<div id="homeTasks"></div>

`;

renderHomeTasks();

}

/* =========================
HOME TASKS
========================= */

function renderHomeTasks(){

const list =
document.getElementById("homeTasks");

if(!list) return;

if(state.tasks.length === 0){

list.innerHTML = `
<div class="empty">
📭 No Tasks Added
</div>
`;

return;

}

list.innerHTML = state.tasks.map(task=>`

<div class="task">

<div class="checkbox
${task.done ? 'checked':''}"
onclick="toggleTask(${task.id})">

${task.done ? '✓':''}

</div>

<div style="flex:1">

<div class="task-title"
style="
${task.done ? 'text-decoration:line-through;opacity:.6':''}
">

${task.title}

</div>

<div class="task-time">
⏰ ${task.time}
</div>

</div>

<button class="icon-btn"
onclick="deleteTask(${task.id})">

<i class="fas fa-trash"></i>

</button>

</div>

`).join("");

}

/* =========================
TASK VIEW
========================= */

function renderTasksView(){

container.innerHTML = `

<div id="allTasks"></div>

`;

const allTasks =
document.getElementById("allTasks");

if(state.tasks.length === 0){

allTasks.innerHTML = `
<div class="empty">
No Tasks Added
</div>
`;

return;

}

allTasks.innerHTML = state.tasks.map(task=>`

<div class="task">

<div class="checkbox
${task.done ? 'checked':''}"
onclick="toggleTask(${task.id})">

${task.done ? '✓':''}

</div>

<div style="flex:1">

<div class="task-title"
style="
${task.done ? 'text-decoration:line-through;opacity:.6':''}
">

${task.title}

</div>

<div class="task-time">
⏰ ${task.time}
</div>

</div>

<button class="icon-btn"
onclick="deleteTask(${task.id})">

<i class="fas fa-trash"></i>

</button>

</div>

`).join("");

}

/* =========================
SUBJECTS
========================= */

function renderSubjects(){

container.innerHTML = `

<div>

<button class="btn"
style="margin-bottom:18px"
onclick="addSubject()">

+ Add Subject

</button>

<div id="subjectsList"></div>

</div>

`;

const list =
document.getElementById("subjectsList");

list.innerHTML = state.subjects.map(subject=>`

<div class="subject">

<div class="subject-left">

<div class="subject-icon">
📘
</div>

<div class="subject-name">
${subject}
</div>

</div>

<button class="icon-btn"
onclick="deleteSubject('${subject}')">

<i class="fas fa-trash"></i>

</button>

</div>

`).join("");

}

/* =========================
SETTINGS
========================= */

function renderSettings(){

container.innerHTML = `

<div class="card">

<button class="btn setting-btn"
onclick="toggleTheme()">

Toggle Theme

</button>

<button class="btn setting-btn"
onclick="exportData()">

Export Data

</button>

<button class="btn"
style="background:#ef4444"
onclick="resetApp()">

Delete All Data

</button>

</div>

`;

}

/* =========================
EVENTS
========================= */

function setupEvents(){

document.getElementById("addTaskBtn")
.addEventListener("click",()=>{

document.getElementById("taskModal")
.classList.add("active");

});

document.getElementById("closeTaskModal")
.addEventListener("click",()=>{

document.getElementById("taskModal")
.classList.remove("active");

});

document.getElementById("taskForm")
.addEventListener("submit",saveTask);

}

/* =========================
SAVE TASK
========================= */

function saveTask(e){

e.preventDefault();

const title =
document.getElementById("taskTitle").value;

const time =
document.getElementById("taskTime").value;

state.tasks.push({
id:Date.now(),
title,
time,
done:false
});

saveData();

document.getElementById("taskForm")
.reset();

document.getElementById("taskModal")
.classList.remove("active");

renderView(state.currentView);

}

/* =========================
TASK ACTIONS
========================= */

function toggleTask(id){

const task =
state.tasks.find(t=>t.id===id);

if(!task) return;

task.done = !task.done;

saveData();

renderView(state.currentView);

}

function deleteTask(id){

state.tasks =
state.tasks.filter(t=>t.id!==id);

saveData();

renderView(state.currentView);

}

/* =========================
SUBJECT ACTIONS
========================= */

function addSubject(){

const name =
prompt("Enter subject name");

if(!name) return;

state.subjects.push(name);

saveData();

renderSubjects();

}

function deleteSubject(name){

state.subjects =
state.subjects.filter(s=>s!==name);

saveData();

renderSubjects();

}

/* =========================
THEME
========================= */

function toggleTheme(){

state.user.dark = !state.user.dark;

applyTheme();

saveData();

}

function applyTheme(){

if(state.user.dark){

document.body.classList.remove("light");

}else{

document.body.classList.add("light");

}

}

/* =========================
EXPORT
========================= */

function exportData(){

const data =
JSON.stringify(state,null,2);

const blob =
new Blob([data],{
type:"application/json"
});

const url =
URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;

a.download = "timeflow-backup.json";

a.click();

}

/* =========================
RESET
========================= */

function resetApp(){

if(!confirm("Delete all app data?"))
return;

localStorage.removeItem("timeflow-data");

location.reload();

}

/* =========================
TIME
========================= */

function updateClock(){

const timeBox =
document.getElementById("timeBox");

if(timeBox){
timeBox.innerText = getTime();
}

}

function getTime(){

const now = new Date();

return now.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});

}

function getGreeting(){

const hour =
new Date().getHours();

if(hour < 12){
return "☀️ Good Morning";
}

if(hour < 17){
return "🌤️ Good Afternoon";
}

return "🌙 Good Evening";

}

</script>

</body>
</html>
